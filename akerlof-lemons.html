// ── Sound ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
const getAudio = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
};
const tone = (freq, type, dur, vol) => {
  vol = vol || 0.25;
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
};

// ── Token ─────────────────────────────────────────────────────────────────────
const Token = ({ section, tierIndex, infoMode, active }) => {
  const tier = SECTION_TIERS[section][tierIndex];
  const style = TIER_STYLES[tierIndex];
  const faded   = !active;
  const fixed   = infoMode === 'fixed'  && active;
  const seller  = infoMode === 'seller' && active;
  const neutral = (infoMode === 'none' || infoMode === 'symmetric') && active;

  let bodyColor, strokeColor, badge;
  if (faded)        { bodyColor = '#d1d5db'; strokeColor = '#9ca3af'; badge = null; }
  else if (neutral) { bodyColor = '#9ca3af'; strokeColor = '#6b7280'; badge = '?'; }
  else if (fixed)   { bodyColor = '#22c55e'; strokeColor = '#15803d'; badge = tier.emoji; }
  else              { bodyColor = style.body; strokeColor = style.text; badge = tier.emoji; }

  const svgProps = { fill: bodyColor, stroke: strokeColor };
  const valueLabel = section === 'investment'
    ? ('$' + tier.value + 'M')
    : tier.value >= 1000 ? ('$' + (tier.value / 1000) + 'K') : ('$' + tier.value);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, opacity: faded ? 0.18 : 1, transition: 'opacity 0.5s' }}>
      <div style={{
        width: 22, height: 22, borderRadius: '50%', flexShrink: 0,
        backgroundColor: faded ? '#d1d5db' : neutral ? '#6b7280' : fixed ? '#15803d' : style.text,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: badge === '?' ? 13 : 11, color: 'white', fontWeight: 700,

      {section === 'phone'      && React.createElement(PhoneSVG,    svgProps)}

          backgroundColor: fixed ? '#15803d' : style.text,
          padding: '1px 5px', borderRadius: 4,

  );
};

// ── Lot Calculation ───────────────────────────────────────────────────────────
const LotCalculation = ({ section, activeTiers, offer }) => {
  const tiers = SECTION_TIERS[section];
  if (!tiers) return null;
  const activeTierObjs = tiers.filter((_, i) => activeTiers.includes(i));
  const totalCount = activeTierObjs.reduce((s, t) => s + t.count, 0);
  const totalValue = activeTierObjs.reduce((s, t) => s + t.value * t.count, 0);
  const avg = totalCount > 0 ? Math.round(totalValue / totalCount) : 0;

  const fmt = v => section === 'investment'
    ? ('$' + v + 'M')
    : v >= 1000 ? ('$' + (v / 1000).toFixed(1) + 'K') : ('$' + v);

  return (
    <div style={{ borderRadius: 10, border: '2px solid ' + colors.clayDark, overflow: 'hidden', marginBottom: 12, backgroundColor: colors.clayLight }}>
      <div style={{ padding: '6px 12px', fontSize: 12, fontWeight: 700, backgroundColor: colors.clay, color: colors.earthDark }}>
        Market Calculation
      </div>
      <div style={{ padding: 12 }}>
        <table style={{ width: '100%', fontSize: 12, color: colors.earthDark, borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid ' + colors.earthLight }}>
              <th style={{ textAlign: 'left',   paddingBottom: 4 }}>Quality</th>
              <th style={{ textAlign: 'center', paddingBottom: 4 }}>Count</th>
              <th style={{ textAlign: 'right',  paddingBottom: 4 }}>Value</th>
              <th style={{ textAlign: 'right',  paddingBottom: 4 }}>Total</th>
            </tr>
          </thead>
          <tbody>
            {tiers.map((tier, i) => {
              const isActive = activeTiers.includes(i);
              return (
                <tr key={i} style={{ opacity: isActive ? 1 : 0.3 }}>
                  <td style={{ padding: '3px 0' }}>{tier.emoji} {tier.label}</td>
                  <td style={{ textAlign: 'center', padding: '3px 0' }}>{isActive ? tier.count : 0}</td>
                  <td style={{ textAlign: 'right',  padding: '3px 0' }}>{fmt(tier.value)}</td>
                  <td style={{ textAlign: 'right',  padding: '3px 0' }}>{isActive ? fmt(tier.value * tier.count) : fmt(0)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ borderTop: '2px solid ' + colors.clay }}>
              <td colSpan={2} style={{ fontWeight: 700, paddingTop: 5 }}>Average</td>
              <td colSpan={2} style={{ textAlign: 'right', fontWeight: 700, paddingTop: 5, color: colors.primary }}>{fmt(avg)}</td>
            </tr>
          </tfoot>
        </table>
        {offer !== null && offer !== undefined && (
          <div style={{
            marginTop: 8, paddingTop: 8, borderTop: '1px solid ' + colors.earthLight,
            display: 'flex', justifyContent: 'space-between',
            fontSize: 13, fontWeight: 700, color: colors.primary,
          }}>
            <span>Buyer's offer</span>
            <span style={{ color: fmt(offer) === fmt(avg) ? colors.success : colors.warning }}>{fmt(offer)}</span>
          </div>
        )}
      </div>
    </div>
  );
};

      </div>
      <div style={{ padding: 12, fontSize: 13, color: '#166534', lineHeight: 1.6 }}>
        <p style={{ marginBottom: 8 }}>{d.body}</p>
        <p style={{ fontWeight: 600 }}>{d.outcome}</p>
      </div>
    </div>
  );
};

// ── Cost Escalation ───────────────────────────────────────────────────────────
const CostEscalation = () => (
  <div style={{ borderRadius: 10, border: '2px solid ' + colors.earthLight, overflow: 'hidden', marginBottom: 12, backgroundColor: 'white' }}>
    <div style={{ padding: '6px 12px', fontSize: 12, fontWeight: 700, backgroundColor: colors.clayLight, color: colors.earthDark }}>
      The Escalating Cost of the Information Fix
    </div>
    <div style={{ padding: 12 }}>
      {[
        { icon: '🚗', label: 'Used Car',       cost: '~$40',           note: 'Commercial solution (Carfax)',                        color: colors.success },
        { icon: '📱', label: 'Used iPhone',    cost: 'Free',           note: 'But buyer must seek it (Battery Health)',              color: '#2563eb'      },
        { icon: '🏢', label: 'Capital Markets', cost: '$100K–$10M+/yr', note: 'Mandatory institutional infrastructure (SEC/Audit)', color: colors.error  },
      ].map((row, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 10, borderRadius: 8, backgroundColor: colors.sand, marginBottom: i < 2 ? 8 : 0 }}>
          <span style={{ fontSize: 20 }}>{row.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: colors.earthDark }}>{row.label}</div>
            <div style={{ fontSize: 11, color: colors.earth }}>{row.note}</div>
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color: row.color, whiteSpace: 'nowrap' }}>{row.cost}</div>
        </div>
      ))}
    </div>
  </div>
);

// ── Capstone Connections ──────────────────────────────────────────────────────
const CapstoneConnections = () => (
  <div style={{ borderRadius: 10, border: '2px solid ' + colors.primary, overflow: 'hidden', marginBottom: 12, backgroundColor: 'white' }}>
    <div style={{ padding: '6px 12px', fontSize: 12, fontWeight: 700, backgroundColor: colors.primary, color: 'white' }}>
      Information in Your Capstone Topics
    </div>
    <div style={{ padding: 12 }}>
      {[
        { topic: 'IPOs',            info: 'Roadshow = company disclosing info to investors before pricing shares. S-1 filing = mandatory disclosure.' },
        { topic: 'Fintech',         info: 'Robinhood democratized market data access — information that was expensive and institutional, now free to retail investors.' },
        { topic: 'Housing Finance', info: 'Mortgage underwriting is information gathering: income verification, credit check, appraisal. Each step closes an information gap.' },
        { topic: 'Credit Markets',  info: 'Credit scores solved the personal lending lemons problem — standardized information that allows lending to scale.' },
      ].map((row, i) => (
        <div key={i} style={{ display: 'flex', gap: 10, padding: 8, borderRadius: 8, backgroundColor: colors.sand, marginBottom: i < 3 ? 8 : 0 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: colors.primary, minWidth: 88, flexShrink: 0, lineHeight: 1.4 }}>{row.topic}</span>
          <span style={{ fontSize: 12, color: colors.earthDark, lineHeight: 1.5 }}>{row.info}</span>
        </div>
      ))}
    </div>
  </div>
);

// ── Spiral Badge ──────────────────────────────────────────────────────────────
const SpiralBadge = () => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: 12, borderRadius: 10, marginBottom: 12, backgroundColor: colors.errorBg, borderLeft: '4px solid ' + colors.error }}>
    <span style={{ fontSize: 22 }}>📉</span>
    <div>
      <div style={{ fontSize: 13, fontWeight: 700, color: colors.error }}>Death Spiral</div>
      <div style={{ fontSize: 11, color: '#991b1b' }}>Quality exits → average falls → more quality exits → …</div>
    </div>
  </div>
);

// ── Main App ──────────────────────────────────────────────────────────────────
const TutorialApp = () => {
  const [idx, setIdx]               = useState(0);
  const [devMode, setDevMode]       = useState(false);
  const [clickCount, setClickCount] = useState(0);

  const step    = STEPS[idx];
  const isFirst = idx === 0;
  const isLast  = idx === STEPS.length - 1;
  const progress = Math.round((idx / (STEPS.length - 1)) * 100);

  const go = (i) => { playContinueClick(); setIdx(i); window.scrollTo(0, 0); };
  const next    = () => { if (!isLast)  go(idx + 1); };
  const prev    = () => { if (!isFirst) go(idx - 1); };
  const restart = () => { playContinueClick(); setIdx(0); window.scrollTo(0, 0); };

  const headerClick = () => {
    const n = clickCount + 1;
    setClickCount(n);
    if (n >= 3) { setDevMode(d => !d); setClickCount(0); }
  };

  const SECTION_COLORS = {
    car:        { bg: '#dbeafe', text: '#1e40af' },
    phone:      { bg: '#fce7f3', text: '#9d174d' },
    investment: { bg: '#d1fae5', text: '#065f46' },
    closing:    { bg: '#fef3c7', text: '#92400e' },
  };
  const sc = SECTION_COLORS[step.section] || SECTION_COLORS.closing;

  return (
    <div style={{ minHeight: '100vh', backgroundColor: colors.sand }}>
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '16px 16px 48px' }}>

        {/* Header */}
        <div style={{ borderRadius: 12, padding: 16, marginBottom: 16, backgroundColor: colors.primary }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div onClick={headerClick} style={{ cursor: 'pointer' }}>
              <h1 style={{ fontSize: 18, fontWeight: 700, color: 'white', lineHeight: 1.3, margin: 0 }}>
                Markets &amp; Information
              </h1>
              <p style={{ fontSize: 13, marginTop: 3, color: colors.earthLight, margin: '3px 0 0' }}>
                Seeds of Fortune &middot; Yale &middot; May 4, 2026
              </p>
            </div>
            <button onClick={restart} title="Restart" aria-label="Restart"
              style={{ fontSize: 20, color: 'white', background: 'none', border: 'none', cursor: 'pointer', padding: 6, lineHeight: 1 }}>
              &#8635;
            </button>
          </div>

          <div style={{ marginTop: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'rgba(255,255,255,0.65)', marginBottom: 4 }}>
              <span>Step {idx + 1} of {STEPS.length}</span>
              <span>{progress}%</span>
            </div>
            <div style={{ height: 7, borderRadius: 99, backgroundColor: 'rgba(255,255,255,0.2)' }}
              role="progressbar" aria-valuenow={progress} aria-valuemin={0} aria-valuemax={100}>
              <div style={{ height: '100%', borderRadius: 99, backgroundColor: colors.accent, width: progress + '%', transition: 'width 0.4s' }} />
            </div>
          </div>

          {devMode && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.2)' }}>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', marginBottom: 6 }}>Dev: jump to step</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                {STEPS.map((s, i) => (
                  <button key={i} onClick={() => go(i)}
                    style={{
                      padding: '2px 8px', borderRadius: 4, fontSize: 11, border: 'none', cursor: 'pointer',
                      backgroundColor: i === idx ? 'white' : 'rgba(255,255,255,0.2)',
                      color: i === idx ? colors.primary : 'white',
                    }}>{s.id}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Section label */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <span style={{ padding: '4px 12px', borderRadius: 99, fontSize: 12, fontWeight: 600, backgroundColor: sc.bg, color: sc.text }}>
            {step.sectionLabel}
          </span>
          <span style={{ fontSize: 11, color: colors.earth }}>{idx + 1} / {STEPS.length}</span>
        </div>

        {/* Headline */}
        <h2 style={{ fontSize: 22, fontWeight: 700, color: colors.primary, marginBottom: 14, lineHeight: 1.3 }}>
          {step.headline}
        </h2>

        {/* Token Grid */}
        {step.section !== 'closing' && (
          React.createElement(TokenGrid, { section: step.section, activeTiers: step.activeTiers, infoMode: step.infoMode })
        )}

        {/* Mode Bar */}
        {step.section !== 'closing' && React.createElement(ModeBar, { infoMode: step.infoMode })}

        {/* Spiral */}
        {step.showSpiral && React.createElement(SpiralBadge)}

        {/* Calculation */}
        {step.showCalc && step.section !== 'closing' && (
          React.createElement(LotCalculation, { section: step.section, activeTiers: step.activeTiers, offer: step.offer })
        )}

        {/* Fix Card */}
        {step.showFix && step.section !== 'closing' && React.createElement(FixCard, { section: step.section })}

        {/* Cost Escalation */}
        {(step.showEscalation || step.showCapstone) && React.createElement(CostEscalation)}

        {/* Capstone */}
        {step.showCapstone && React.createElement(CapstoneConnections)}

        {/* Narrative */}
        <div style={{
          padding: 16, borderRadius: 10, marginBottom: 12,
          backgroundColor: colors.sand, borderLeft: '4px solid ' + colors.accent,
          fontStyle: 'italic', fontSize: 14, color: '#374151', lineHeight: 1.65,
        }}>
          {step.narrative}
        </div>

        {/* Insight */}
        {step.insight && (
          <div style={{
            padding: 14, borderRadius: 10, border: '2px solid ' + colors.accent,
            backgroundColor: '#fef9e7', marginBottom: 12,
            display: 'flex', gap: 12, alignItems: 'flex-start',
          }}>
            <span style={{ fontSize: 18, color: colors.accent, flexShrink: 0, marginTop: 1 }}>💡</span>
            <div style={{ fontSize: 13, color: colors.earthDark, lineHeight: 1.6 }}>{step.insight}</div>
          </div>
        )}

        {/* Closing coda */}
        {step.section === 'closing' && (
          <div style={{ padding: 20, borderRadius: 10, textAlign: 'center', backgroundColor: colors.primary, marginBottom: 12 }}>
            <p style={{ color: 'white', fontWeight: 700, fontSize: 16, margin: 0 }}>
              The invisible thread in every market
            </p>
            <p style={{ color: colors.earthLight, fontSize: 13, marginTop: 8, margin: '8px 0 0' }}>
              is the cost of knowing what you are actually buying.
            </p>
          </div>
        )}

        {/* Navigation */}
        <div style={{ display: 'flex', gap: 12, marginTop: 18 }}>
          <button onClick={prev} disabled={isFirst} aria-label="Previous step"
            style={{
              flex: 1, padding: '14px 0', borderRadius: 10, fontWeight: 700, fontSize: 15,
              backgroundColor: isFirst ? '#e5e7eb' : 'white',
              color: isFirst ? '#9ca3af' : colors.primary,
              border: '2px solid ' + (isFirst ? '#e5e7eb' : colors.primary),
              cursor: isFirst ? 'not-allowed' : 'pointer',
            }}>← Back</button>
          <button onClick={next} disabled={isLast} aria-label="Next step"
            style={{
              flex: 1, padding: '14px 0', borderRadius: 10, fontWeight: 700, fontSize: 15,
              backgroundColor: isLast ? '#e5e7eb' : colors.primary,
              color: isLast ? '#9ca3af' : 'white',
              border: 'none', cursor: isLast ? 'not-allowed' : 'pointer',
            }}>{isLast ? '✓ Complete' : 'Next →'}</button>
        </div>

        {/* Step dots */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 5, marginTop: 16, flexWrap: 'wrap' }}>
          {STEPS.map((s, i) => {
            const dotColors = { car: '#3b82f6', phone: '#ec4899', investment: '#22c55e', closing: '#c9a227' };
            const active = i === idx;
            const past   = i < idx;
            return (
              <button key={i} onClick={() => go(i)} aria-label={'Step ' + (i + 1) + ': ' + s.headline}
                style={{
                  width: active ? 14 : 9, height: active ? 14 : 9,
                  borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0, flexShrink: 0,
                  backgroundColor: active ? dotColors[s.section] : past ? colors.earthLight : '#e5e7eb',
                  transition: 'all 0.2s',
                }} />
            );
          })}
        </div>

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TutorialApp));
</script>
</body>
</html>
