<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Marketplace — Seeds of Fortune</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f1e8;
      min-height: 100vh;
      padding: 36px 24px 64px;
    }

    .scene {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: #00356b;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #8b7355;
      margin-bottom: 32px;
    }

    /* ── Two-column deck layout ── */
    .two-decks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
      margin-bottom: 24px;
    }

    .deck-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .col-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b7355;
      background: #e8dcc8;
      padding: 5px 14px;
      border-radius: 6px;
      text-align: center;
      white-space: nowrap;
    }

    /* ── Stack ── */
    /*
      Card size: 230 × 188
      3 shadow layers offset by 8px each → total stack width/height adds 3×8 = 24px
      Container: 254 × 212
      Front card sits at top:24, left:0 (shadows peek right+below)
    */
    .stack {
      position: relative;
      width: 254px;
      height: 214px;
    }

    .shadow {
      position: absolute;
      width: 230px;
      height: 188px;
      border-radius: 14px;
      background: #d4c4a8;
      border: 2px solid #c4a574;
      transition: opacity 0.4s ease;
    }
    /* shadows offset to bottom-right — peeking from behind the front card */
    .shadow.z1 { top: 16px; left: 24px; z-index: 1; }
    .shadow.z2 { top: 8px;  left: 16px; z-index: 2; }
    .shadow.z3 { top: 0;    left: 8px;  z-index: 3; }

    .card-wrap {
      position: absolute;
      top: 24px;
      left: 0;
      width: 230px;
      height: 188px;
      z-index: 4;
      perspective: 900px;
      cursor: pointer;
    }

    /* ── The flippable card ── */
    .card {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 22px rgba(0,0,0,0.14);
      transition: transform 0.28s cubic-bezier(0.55, 0, 0.45, 1);
      transform-origin: center;
      backface-visibility: hidden;
    }
    .card.flipping {
      transform: rotateY(90deg);
    }

    .card-body {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 11px;
    }

    .card-who {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-badge {
      font-size: 13px;
      font-weight: 700;
      padding: 3px 11px;
      border-radius: 99px;
    }
    .card-price {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    /* ── Counter ── */
    .counter {
      font-size: 12px;
      font-weight: 600;
      color: #a8977c;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .flip-btn {
      background: #00356b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 44px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .flip-btn:hover  { background: #002a55; }
    .flip-btn:active { transform: scale(0.97); }

    .reset-btn {
      background: none;
      border: 1.5px solid #c4a574;
      color: #8b7355;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .reset-btn:hover { background: #e8dcc8; }

    .hint {
      font-size: 11px;
      color: #c4a574;
    }
  </style>
</head>
<body>
<div class="scene">

  <div class="title">Meet the Facebook Marketplace</div>
  <div class="subtitle">Four used cars · Four sellers · One buyer</div>

  <div class="two-decks">

    <!-- SELLER DECK -->
    <div class="deck-col">
      <div class="col-label">Each seller privately knows</div>
      <div class="stack">
        <div class="shadow z1" id="ss1"></div>
        <div class="shadow z2" id="ss2"></div>
        <div class="shadow z3" id="ss3"></div>
        <div class="card-wrap">
          <div class="card" id="sCard"></div>
        </div>
      </div>
      <div class="counter" id="sCtr"></div>
    </div>

    <!-- BUYER DECK -->
    <div class="deck-col">
      <div class="col-label">What the buyer sees</div>
      <div class="stack">
        <div class="shadow z1" id="bs1"></div>
        <div class="shadow z2" id="bs2"></div>
        <div class="shadow z3" id="bs3"></div>
        <div class="card-wrap">
          <div class="card" id="bCard"></div>
        </div>
      </div>
      <div class="counter" id="bCtr"></div>
    </div>

  </div>

  <div class="controls">
    <button class="flip-btn" id="mainBtn">Flip card →</button>
    <button class="reset-btn" id="resetBtn">↺ Start over</button>
    <span class="hint" id="hint">Click the button or either card to flip</span>
  </div>

</div>

<script>
// ── Data ───────────────────────────────────────────────────────
const SELLERS = [
  { bg:'#fef3c7', border:'#c9a227', txt:'#78350f',
    carFill:'#c9a227', carStroke:'#92400e',
    badge:'⭐ Mint', price:'$20,000', who:'Seller A' },
  { bg:'#dcfce7', border:'#22c55e', txt:'#14532d',
    carFill:'#22c55e', carStroke:'#15803d',
    badge:'✓ Good', price:'$14,000', who:'Seller B' },
  { bg:'#ffedd5', border:'#f97316', txt:'#7c2d12',
    carFill:'#f97316', carStroke:'#c2410c',
    badge:'⚠ Fair', price:'$8,000', who:'Seller C' },
  { bg:'#fee2e2', border:'#dc2626', txt:'#7f1d1d',
    carFill:'#dc2626', carStroke:'#991b1b',
    badge:'🍋 Lemon', price:'$2,000', who:'Seller D' },
];

// ── SVG helper ────────────────────────────────────────────────
function carSVG(fill, stroke, w=118, h=77) {
  return `<svg viewBox="0 0 64 42" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="20" width="56" height="17" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    <path d="M15 20 L21 7 L43 7 L49 20 Z" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    <circle cx="17" cy="37" r="5" fill="#374151" stroke="${stroke}" stroke-width="1.5"/>
    <circle cx="47" cy="37" r="5" fill="#374151" stroke="${stroke}" stroke-width="1.5"/>
    <path d="M23 9 L21 17 L32 17 L32 9 Z" fill="${stroke}" opacity=".3"/>
    <path d="M34 9 L34 17 L43 17 L41 9 Z" fill="${stroke}" opacity=".3"/>
  </svg>`;
}

// ── DOM refs ──────────────────────────────────────────────────
const sCard   = document.getElementById('sCard');
const bCard   = document.getElementById('bCard');
const sCtr    = document.getElementById('sCtr');
const bCtr    = document.getElementById('bCtr');
const mainBtn = document.getElementById('mainBtn');
const hint    = document.getElementById('hint');

// shadow pairs: index 1-3
const ss = { 1: document.getElementById('ss1'), 2: document.getElementById('ss2'), 3: document.getElementById('ss3') };
const bs = { 1: document.getElementById('bs1'), 2: document.getElementById('bs2'), 3: document.getElementById('bs3') };

// ── State ─────────────────────────────────────────────────────
let idx  = 0;     // which card is showing (0–3)
let busy = false; // animation lock
let done = false; // all cards flipped

// ── Shadow visibility ─────────────────────────────────────────
function refreshShadows() {
  const behind = 3 - idx; // cards remaining behind front
  const opacities = { 1: 0.70, 2: 0.50, 3: 0.28 };
  for (let i = 1; i <= 3; i++) {
    const show = i <= behind;
    ss[i].style.opacity = show ? opacities[i] : '0';
    bs[i].style.opacity = show ? opacities[i] : '0';
  }
}

// ── Card renderers ────────────────────────────────────────────
function paintSeller(i) {
  const s = SELLERS[i];
  sCard.style.cssText = `background:${s.bg}; border:2.5px solid ${s.border};`;
  sCard.innerHTML = `
    <div class="card-body">
      <div class="card-who" style="color:${s.txt};">${s.who}</div>
      ${carSVG(s.carFill, s.carStroke)}
      <div class="card-badge" style="background:${s.border}1a; color:${s.txt}; border:1.5px solid ${s.border};">
        ${s.badge}
      </div>
      <div class="card-price" style="color:${s.txt};">${s.price}</div>
    </div>`;
}

function paintBuyer(i) {
  bCard.style.cssText = 'background:#f3f4f6; border:2.5px solid #d1d5db;';
  bCard.innerHTML = `
    <div class="card-body">
      <div class="card-who" style="color:#9ca3af;">Listing ${i + 1}</div>
      ${carSVG('#d1d5db', '#9ca3af')}
      <div class="card-badge" style="background:#e5e7eb; color:#9ca3af; border:1.5px solid #d1d5db;">
        Used car
      </div>
      <div class="card-price" style="color:#9ca3af; font-size:32px;">?</div>
    </div>`;
}

// ── Done state ────────────────────────────────────────────────
function paintDone() {
  done = true;

  // Seller summary — mini row of all 4 cars
  const miniRow = SELLERS.map(s =>
    `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
       ${carSVG(s.carFill, s.carStroke, 44, 29)}
       <span style="font-size:9px;font-weight:700;color:${s.txt};">${s.price}</span>
     </div>`
  ).join('');

  sCard.style.cssText = 'background:white; border:2.5px solid #c4a574;';
  sCard.innerHTML = `
    <div class="card-body">
      <div class="card-who" style="color:#8b7355;">All 4 sellers</div>
      <div style="display:flex;gap:6px;align-items:flex-end;justify-content:center;">${miniRow}</div>
      <div style="width:100%;background:#f5f1e8;border-radius:8px;padding:8px 10px;text-align:center;">
        <div style="font-size:11px;color:#8b7355;font-weight:600;">Values range from</div>
        <div style="font-size:14px;font-weight:800;color:#00356b;margin-top:2px;">$2,000 → $20,000</div>
      </div>
    </div>`;

  // Buyer summary
  bCard.style.cssText = 'background:#eff6ff; border:2.5px solid #93c5fd;';
  bCard.innerHTML = `
    <div class="card-body">
      <div class="card-who" style="color:#1e40af;">After 4 listings</div>
      ${carSVG('#d1d5db', '#9ca3af')}
      <div style="font-size:12px;font-weight:600;color:#1e40af;text-align:center;line-height:1.5;">
        Same car, every time
      </div>
      <div style="width:100%;background:#dbeafe;border-radius:8px;padding:8px 10px;text-align:center;">
        <div style="font-size:11px;color:#1d4ed8;font-weight:600;">Best offer</div>
        <div style="font-size:20px;font-weight:800;color:#1e3a8a;margin-top:1px;">$11,000</div>
      </div>
    </div>`;

  // Hide all shadows
  for (let i = 1; i <= 3; i++) {
    ss[i].style.opacity = '0';
    bs[i].style.opacity = '0';
  }

  sCtr.textContent = 'All 4 revealed';
  bCtr.textContent = 'All 4 seen';
  mainBtn.textContent = '↺ Start over';
  hint.textContent = 'Click "Start over" to see it again';
}

// ── Flip ──────────────────────────────────────────────────────
function doFlip() {
  if (busy) return;
  if (done) { doReset(); return; }

  busy = true;
  sCard.classList.add('flipping');
  bCard.classList.add('flipping');

  setTimeout(() => {
    idx++;
    if (idx >= 4) {
      paintDone();
    } else {
      paintSeller(idx);
      paintBuyer(idx);
      refreshShadows();
      sCtr.textContent = `Card ${idx + 1} of 4`;
      bCtr.textContent = `Card ${idx + 1} of 4`;
    }
    sCard.classList.remove('flipping');
    bCard.classList.remove('flipping');
    busy = false;
  }, 280);
}

// ── Reset ─────────────────────────────────────────────────────
function doReset() {
  idx = 0; busy = false; done = false;
  paintSeller(0);
  paintBuyer(0);
  refreshShadows();
  sCtr.textContent = 'Card 1 of 4';
  bCtr.textContent = 'Card 1 of 4';
  mainBtn.textContent = 'Flip card →';
  hint.textContent = 'Click the button or either card to flip';
}

// ── Wire up events ────────────────────────────────────────────
mainBtn.addEventListener('click', doFlip);
document.getElementById('resetBtn').addEventListener('click', doReset);
document.querySelector('#sCard').parentElement.addEventListener('click', doFlip);
document.querySelector('#bCard').parentElement.addEventListener('click', doFlip);

// ── Init ──────────────────────────────────────────────────────
doReset();
</script>
</body>
</html>
